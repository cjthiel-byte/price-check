name: Publish Daily Puzzle

on:
  schedule:
    - cron: '5 0 * * *'  # 00:05 UTC every day
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build puzzle JSON files from Google Sheet
        run: python3 scripts/build_puzzles.py "${{ secrets.SHEET_CSV_URL }}"

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add puzzles/
          git diff --staged --quiet || git commit -m "chore: publish puzzles $(date -u +%Y-%m-%d)"
          git push
